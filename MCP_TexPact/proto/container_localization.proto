syntax = "proto3";
package texpact;

import "google/protobuf/empty.proto";


message ContainerLocalization {
  int32 id             = 1;
  int32 containerId    = 2;
  int32 sectionId      = 3;
  string datetime      = 4;
  string containerName = 5;
  string sectionName   = 6;
}

message ContainerLocalizationList {
  repeated ContainerLocalization items = 1;
}


message ContainerLocalizationBySectionRequest {
  int32 sectionId = 1;
}


message LocalizationIdRequest {
  int32 id = 1;
}


message ContainerLocalizationByContainerRequest {
  int32 containerId = 1;
}

message SectionTimeRequest {
  int32  sectionId = 1;
  string datetime  = 2;
}
service ContainerLocalizationService {

  rpc ListContainerLocalizations(google.protobuf.Empty)
      returns (ContainerLocalizationList);

  rpc ListBySection(ContainerLocalizationBySectionRequest)
      returns (ContainerLocalizationList);

  rpc GetById(LocalizationIdRequest)
      returns (ContainerLocalization);

  rpc ListWithContainerNamesBySection(ContainerLocalizationBySectionRequest)
      returns (ContainerLocalizationList);

  rpc ListSectionsByContainer(ContainerLocalizationByContainerRequest)
      returns (ContainerLocalizationList);

   rpc ListBySectionAtTime(SectionTimeRequest)
       returns (ContainerLocalizationList);
}
