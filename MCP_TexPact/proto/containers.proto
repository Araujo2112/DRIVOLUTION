syntax = "proto3";
package texpact;

import "google/protobuf/empty.proto";

message NameField {
  string name = 1;
}

message Container {
  int32       containerId     = 1;
  NameField   id              = 2;
  NameField   containerName   = 3;
  int32       containerVolume = 4;
  bool        activate        = 5;
}

message ContainerList {
  repeated Container containers = 1;
}

message ContainerIdRequest {
  int32 containerId = 1;
}

service ContainerService {
  rpc ListContainers(google.protobuf.Empty) returns (ContainerList);
  rpc GetContainerById(ContainerIdRequest) returns (Container);
}

