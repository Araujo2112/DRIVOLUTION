syntax = "proto3";
package texpact;

import "google/protobuf/empty.proto";

message ManufacturingOrder {
  int32 id                         = 1;
  int32 orderNumber                = 2;
  string sheduleInit               = 3;
  string observations              = 4;
  string manufacturingOrderId      = 5;
  int32 clientId                   = 6;
  int32 manufacturingProcessId     = 7;
  int32 productLotId               = 8;

  string clientName                = 9;
  string manufacturingProcessName  = 10;
  string productLotName            = 11;
}

message ManufacturingOrderList {
  repeated ManufacturingOrder items = 1;
}

message ItemOfRawMaterial {
    int32 itemRawId = 1;
    double quantity = 2;
    string unit = 3;
    int32 lotOfRawMaterialId = 4;
    int32 itemInContainerId = 5;
    int32 manufacturingOrderPhaseId = 6;
    int32 manufacturingOrderId = 7;

    string rawMaterialName = 8;
    string rawMaterialInfo = 9;
    string lotNumber = 10;
    int32 lotQuantity = 11;
    string lotUnit = 12;
    int32 rawMaterialId = 13;
}

message ItemOfRawMaterialList {
  repeated ItemOfRawMaterial items = 1;
}

message ManufacturingOrderPhase {
  int32 id                         = 1;
  int32 manufacturingOrderId       = 2;
  int32 manufacturingPhaseId       = 3;
  int32 quantity                   = 4;
  string sheduleInit               = 5;
  string dateTimeInit              = 6;
  string dateTimeEnd               = 7;
}
message ManufacturingOrderPhaseList {
  repeated ManufacturingOrderPhase items = 1;
}

message ManufacturingOrderHistory {
  int32 manufacturingOrderId       = 1;
  int32 plantFloorSectionId        = 2;
  string dateTime                  = 3;
  string statusName                = 4;
}
message ManufacturingOrderHistoryList {
  repeated ManufacturingOrderHistory items = 1;
}

message ItemLocalization {
  int32 itemLocalizationId         = 1;
  int32 itemRawId                  = 2;
  int32 containerLocalizationId    = 3;
  string dateTime                  = 4;
}
message ItemLocalizationList {
  repeated ItemLocalization items = 1;
}

message OrderIdRequest {
  int32 orderId = 1;
}
message ItemLocalizationRequest {
  int32 itemLocalizationId = 1;
}

service ManufacturingOrderService {
  rpc List(google.protobuf.Empty)                 returns (ManufacturingOrderList);
  rpc GetById(OrderIdRequest)                     returns (ManufacturingOrder);
  rpc ListRawMaterialsByOrder(OrderIdRequest)     returns (ItemOfRawMaterialList);
  rpc ListPhasesByOrder(OrderIdRequest)           returns (ManufacturingOrderPhaseList);
  rpc ListHistoryByOrder(OrderIdRequest)          returns (ManufacturingOrderHistoryList);
}

service ItemLocalizationService {
  rpc List(google.protobuf.Empty)                 returns (ItemLocalizationList);
  rpc GetById(ItemLocalizationRequest)            returns (ItemLocalization);
  rpc ListByOrderItems(OrderIdRequest)            returns (ItemLocalizationList);
}
