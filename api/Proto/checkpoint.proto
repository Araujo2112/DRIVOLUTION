syntax = "proto3";
package texpact;

import "clients.proto";

message CheckpointField {
  string name = 1;
}

message Checkpoint {
  int32 checkpointId = 1;
  string id = 2;
  CheckpointField name = 3;
  bool status = 4;
  int32 sectionId = 5;
}

message CheckpointList {
  repeated Checkpoint checkpoints = 1;
}

message SectionIdRequest {
  int32 sectionId = 1;
}

service CheckpointService {
  rpc ListCheckpoints(Empty) returns (CheckpointList);
  rpc GetCheckpointById(CheckpointIdRequest) returns (Checkpoint);
  rpc ListCheckpointsBySection(SectionIdRequest) returns (CheckpointList);
}

message CheckpointIdRequest {
  int32 checkpointId = 1;
}
