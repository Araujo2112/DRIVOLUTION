syntax = "proto3";
package texpact;

message Empty {}

service ClientService {
  rpc ListClients (Empty) returns (ClientList);
  rpc GetClientById (ClientIdRequest) returns (Client);
}

message ClientIdRequest {
  int32 client_id = 1;
}

message Client {
  int32 id            = 1;
  string name         = 2;
  string fiscalNumber = 3;
}

message ClientList {
  repeated Client clients = 1;
}
