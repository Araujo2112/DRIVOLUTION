syntax = "proto3";
package texpact;

import "clients.proto";

message TrainResponse {
  string message = 1;
  int32 version = 2;
  string trainedUntil = 3;
}

message PredictFeature {
  int32 Quantity = 1;
  int32 PhaseId = 2;
  int32 SectionId = 3;
  int32 ProductId = 4;
  int32 ClientId = 5;
  int32 LotQty = 6;
  int32 Hour = 7;
  int32 WeekDay = 8;
}

message PredictRequest {
  repeated PredictFeature features = 1;
}

message PredictResponse {
  repeated float predictions = 1;
}

service MlpPredictionService {
  rpc Train(Empty) returns (TrainResponse);
  rpc Predict(PredictRequest) returns (PredictResponse);
}
