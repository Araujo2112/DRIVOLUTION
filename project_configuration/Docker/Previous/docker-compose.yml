services:
  # Orion is an NGSI-v2 context broker
  orion:
    platform: linux/x86_64
    image: fiware/orion-ld
    hostname: orion
    container_name: fiware--orion
    depends_on:
      - mongo-db
    expose:
      - "1026"
    ports:
      - "1026:1026"
    command: -dbhost mongo-db -logLevel DEBUG
    healthcheck:
      test: curl --fail -s http://orion:1026/version || exit 1
      interval: 5s

  # IoT-Agent is configured for the Custom XML Protocol
  iot-agent:
    labels:
      org.fiware: 'tutorial'
    image: quay.io/fiware/iotagent-ul:${ULTRALIGHT_VERSION}
    hostname: iot-agent
    container_name: fiware--iot--agent
    depends_on:
      - mongo-db
    networks:
      - default
    expose:
      - "${IOTA_NORTH_PORT}"
      - "${IOTA_SOUTH_PORT}"
    ports:
      - "${IOTA_NORTH_PORT}:${IOTA_NORTH_PORT}" # localhost:4041
      - "${IOTA_SOUTH_PORT}:${IOTA_SOUTH_PORT}" # localhost:7896
    environment:
      - IOTA_CB_HOST=orion # name of the context broker to update context
      - IOTA_CB_PORT=${ORION_PORT} # port the context broker listens on to update context
      - IOTA_NORTH_PORT=${IOTA_NORTH_PORT}
      - IOTA_REGISTRY_TYPE=mongodb #Whether to hold IoT device info in memory or in a database
      - IOTA_LOG_LEVEL=DEBUG # The log level of the IoT Agent
      - IOTA_TIMESTAMP=true # Supply timestamp information with each measurement
      - IOTA_CB_NGSI_VERSION=v2 # use NGSIv2 when sending updates for active attributes
      - IOTA_AUTOCAST=true # Ensure Ultralight number values are read as numbers not strings
      - IOTA_MONGO_HOST=mongo-db # The host name of MongoDB
      - IOTA_MONGO_PORT=${MONGO_DB_PORT} # The port mongoDB is listening on
      - IOTA_MONGO_DB=iotagentul # The name of the database used in mongoDB
      - IOTA_HTTP_PORT=${IOTA_SOUTH_PORT} # The port used for device traffic over HTTP
      - IOTA_PROVIDER_URL=http://iot-agent:${IOTA_NORTH_PORT}
      - IOTA_DEFAULT_RESOURCE=/iot/d
    healthcheck:
      interval: 5s

  # MongoDB for storing IoT Agent data
  mongo-db:
    labels:
      org.fiware: 'tutorial'
    image: mongo:${MONGO_DB_VERSION}
    hostname: mongo-db
    container_name: mongo-db
    expose:
      - "${MONGO_DB_PORT}"
    ports:
      - "${MONGO_DB_PORT}:${MONGO_DB_PORT}" # localhost:27017
    networks:
      - default
    volumes:
      - mongo-db:/data/db # Persistência de dados do MongoDB
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Keycloak for authentication
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    hostname: keycloak
    container_name: keycloak
    command: start
    depends_on:
      - db
    ports:
      - "10000:10000"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=texpact
      - KC_BOOTSTRAP_ADMIN_PASSWORD=texpact
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/keycloak?ssl=allow
      - KC_DB_USERNAME=texpact
      - KC_DB_PASSWORD=texpact
      - KC_HTTP_PORT=10000

  # influxDB
  influxdb2:
    image: influxdb:2
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: ${influxdb2-admin-username}
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: ${influxdb2-admin-password} 
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: ${influxdb2-admin-token}
      DOCKER_INFLUXDB_INIT_ORG: docs 
      DOCKER_INFLUXDB_INIT_BUCKET: home
      
    volumes:
      - type: volume
        source: influxdb2-data
        target: /var/lib/influxdb2
      - type: volume
        source: influxdb2-config
        target: /etc/influxdb2  

  # quantum leap

  quantumleap:
    image: fiware/quantum-leap
    hostname: quantumleap
    ports:
      - '8668:8668'
    depends_on:
      - influxdb2
    environment:
      - INFLUX_HOST=${INFLUX_HOST:-influxdb2}
      - LOGLEVEL=DEBUG

  grafana:
    image: grafana/grafana
    depends_on:
      - influxdb2
    ports:
      - '3003:3000'
    
  # PostgreSQL database
  db:
    image: postgres:15
    hostname: db
    container_name: texpact-db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_USER: texpact
      POSTGRES_PASSWORD: texpact
      POSTGRES_DB: texpact

networks:
  default:
    labels:
      org.fiware: 'tutorial'
    ipam:
      config:
        - subnet: 172.18.1.0/24

volumes:
  mongo-db: # Volume para persistir dados do MongoDB
  influxdb2-data: #Volume para persistir dados do influxDB
  influxdb2-config: #Volume para persistir dados do influxDB
