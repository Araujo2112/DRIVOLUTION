openapi: "3.0.0"
info:
  title: "Modelo para Fábrica e Contêineres"
  description: "Definições de entidades para modelar uma fábrica com setores e contêineres"
  version: "1.0.0"

components:
  schemas:
    Sector:
      type: object
      required:
        - id
        - type
        - porticos
      properties:
        id:
          type: string
          description: "Identificador único do setor"
        type:
          type: string
          enum: [ "Sector" ]
          description: "Define o tipo como 'Sector'"
        location:
          type: object
          description: "Localização geográfica do setor"
          properties:
            type:
              type: string
              enum: [ "Point" ]
            coordinates:
              type: array
              items:
                type: number
              description: "Coordenadas de latitude e longitude"
        porticos:
          type: array
          description: "Lista de pórticos pertencentes ao setor"
          items:
            type: object
            required:
              - id
              - sector
            properties:
              id:
                type: string
                description: "Identificador único do pórtico"
              type:
                type: string
                enum: [ "Portico" ]
                description: "Define o tipo como 'Portico'"
              location:
                type: object
                description: "Localização geográfica do pórtico"
                properties:
                  type:
                    type: string
                    enum: [ "Point" ]
                  coordinates:
                    type: array
                    items:
                      type: number
                    description: "Coordenadas de latitude e longitude"
              sector:
                type: object
                description: "Setor associado ao pórtico, com blocos de sensores e contêineres"
                required:
                  - blockA
                  - blockB
                properties:
                  blockA:
                    type: object
                    description: "Bloco de sensores A"
                    properties:
                      sensorA1:
                        $ref: "#/components/schemas/MotionSensor"
                      sensorA2:
                        $ref: "#/components/schemas/RefIdSensor"
                      containerPassed:
                        type: boolean
                        description: "Indica se algum contêiner passou pelo sensor A"
                  blockB:
                    type: object
                    description: "Bloco de sensores B"
                    properties:
                      sensorB1:
                        $ref: "#/components/schemas/MotionSensor"
                      sensorB2:
                        $ref: "#/components/schemas/RefIdSensor"  # Ajuste aqui a referência para o dispositivo FIWARE
                      containerPassed:
                        type: boolean
                        description: "Indica se algum contêiner passou pelo sensor B"
    MotionSensor:
      type: object
      required:
        - id
        - type
        - status
      properties:
        id:
          type: string
          description: "Identificador único do sensor"
        type:
          type: string
          enum: [ "MotionSensor" ]
          description: "Define o tipo como 'MotionSensor'"
        status:
          type: string
          enum: [ "active", "inactive" ]
          description: "Status do sensor (ativo ou inativo)"
    
    RefIdSensor:
      type: object
      required:
        - id
        - type
        - level
      properties:
        id:
          type: string
          description: "Identificador único do sensor RFID"
        type:
          type: string
          enum: [ "RfIdSensor" ]
          description: "Define o tipo como 'RfIdSensor'"
        level:
          type: number
          description: "Nível de leitura detectado pelo sensor RFID"
