components:
  schemas:
    Container:
      type: object
      required:
        - id
        - name
        - description
        - capacity
      properties:
        id:
          type: string
          description: Unique identifier for the container.
        name:
          type: string
          description: Name of the container.
        description:
          type: string
          description: Detailed description of the container.
        capacity:
          type: integer
          description: Capacity of the container (in cubic meters or appropriate unit).

paths:
  /containers:
    get:
      summary: Get a list of containers.
      responses:
        "200":
          description: A list of containers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Container"
    post:
      summary: Create a new container.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Container"
      responses:
        "201":
          description: Container successfully created.

info:
  title: Smart Data Model for Containers
  version: 1.0.0
  description: Data model for containers, with capacity and description.
openapi: "3.0.0"
