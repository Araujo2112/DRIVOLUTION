components:
  schemas:
    Factory:
      type: object
      required:
        - id
        - name
        - description
        - location
        - typeIndustry
        - numberOfEmployees
        - containers
        - sectors
      properties:
        id:
          type: string
          description: Unique identifier for the factory.
        name:
          type: string
          description: Name of the factory.
        description:
          type: string
          description: Detailed description of the factory.
        location:
          type: string
          description: Physical location of the factory.
        typeIndustry:
          type: string
          description: The type of industry the factory operates in.
        numberOfEmployees:
          type: integer
          description: The number of employees working at the factory.
        sectors:
          type: array
          items:
            $ref: "./factory_merged.yaml#/components/schemas/Sector"
          description: List of sectors within the factory.
          
paths:
  /factories:
    get:
      summary: Get a list of factories.
      responses:
        "200":
          description: A list of factories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Factory"
    post:
      summary: Create a new factory.
      requestBody:
        description: Create a new factory.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Factory"
      responses:
        "201":
          description: Factory successfully created.
    put:
      summary: Update an existing factory.
      requestBody:
        description: Update an existing factory.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Factory"
      responses:
        "200":
          description: Factory successfully updated.
    delete:
      summary: Delete a factory.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Factory successfully deleted.

info:
  title: Smart Data Model for Factory
  version: 1.0.0
  description: Data model for factories, with sectors, containers, and industry type.
openapi: "3.0.0"