components:
  schemas:
    SensorGroup:
      type: object
      required:
        - id
        - name
        - position
        - sensors
      properties:
        id:
          type: string
          description: Unique identifier for the sensor group.
        name:
          type: string
          description: Name of the sensor group.
        description:
          type: string
          description: Detailed description of the sensor group.
        position:
          type: string
          enum:
            - before
            - middle
            - after
          description: Position of the sensor group in the checkpoint (e.g., before, middle, or after).
        sensors:
          type: array
          items:
            $ref: "./sensor.yaml#/components/schemas/Sensor"
          description: Array of sensors within the group.

paths:
  /sensor-groups:
    get:
      summary: Get a list of sensor groups.
      responses:
        "200":
          description: A list of sensor groups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorGroup"
    post:
      summary: Create a new sensor group.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorGroup"
      responses:
        "201":
          description: Sensor group successfully created.

info:
  title: Smart Data Model for Sensor Groups
  version: 1.0.0
  description: Data model for sensor groups, allowing flexible arrays of sensors and defining their position.
openapi: "3.0.0"
