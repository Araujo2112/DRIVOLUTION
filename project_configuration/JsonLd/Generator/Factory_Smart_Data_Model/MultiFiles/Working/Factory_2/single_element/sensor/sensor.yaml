components:
  schemas:
    Sensor:
      type: object
      required:
        - id
        - name
        - description
        - type
        - state
      properties:
        id:
          type: string
          description: Unique identifier for the sensor.
        name:
          type: string
          description: Name of the sensor.
        description:
          type: string
          description: Detailed description of the sensor.
        type:
          type: string
          description: Type of the sensor (e.g., "position", "weight", etc.).
        state:
          type: string
          enum:
            - active
            - inactive
          description: State of the sensor (active or inactive).

paths:
  /sensors:
    get:
      summary: Get a list of sensors.
      responses:
        "200":
          description: A list of sensors.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sensor"
    post:
      summary: Create a new sensor.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Sensor"
      responses:
        "201":
          description: Sensor successfully created.

info:
  title: Smart Data Model for Sensors
  version: 1.0.0
  description: Data model for sensors with various types and states.
openapi: "3.0.0"
