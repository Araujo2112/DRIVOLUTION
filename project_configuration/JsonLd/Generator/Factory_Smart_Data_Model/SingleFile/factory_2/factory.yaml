openapi: 3.0.0
info:
  title: API da Fábrica
  description: API para gerenciamento de fábrica, setores, contentores e sensores.
  version: 1.0.0

paths:
  /fabrica:
    get:
      summary: Retorna informações sobre a fábrica.
      responses:
        '200':
          description: Detalhes da fábrica
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fabrica'

  /setores/{setorId}:
    get:
      summary: Retorna informações de um setor específico.
      parameters:
        - name: setorId
          in: path
          required: true
          schema:
            type: integer
          description: ID do setor.
      responses:
        '200':
          description: Detalhes do setor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Setor'

components:
  schemas:
    Fabrica:
      type: object
      properties:
        nome:
          type: string
          example: "Fábrica ABC"
        localização:
          type: string
          example: "Rua Industrial, 123"
        setores:
          type: array
          items:
            $ref: '#/components/schemas/Setor'

    Setor:
      type: object
      properties:
        nome:
          type: string
          example: "Setor A"
        id_setor:
          type: integer
          example: 1
        contentores:
          type: array
          items:
            $ref: '#/components/schemas/Contentor'
        portico:
          $ref: '#/components/schemas/Portico'

    Contentor:
      type: object
      properties:
        id_contentor:
          type: string
          example: "C001"
        tipo:
          type: string
          example: "Caixa"
        capacidade:
          type: string
          example: "500kg"

    Sensor:
      type: object
      properties:
        id_sensor:
          type: string
          example: "A1"
        tipo:
          type: string
          example: "Proximidade"
        status:
          type: string
          example: "ativo"

    Portico:
      type: object
      properties:
        sensores:
          type: object
          properties:
            A:
              type: array
              items:
                $ref: '#/components/schemas/Sensor'
            B:
              type: array
              items:
                $ref: '#/components/schemas/Sensor'
